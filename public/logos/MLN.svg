<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Losango (diamante) com fundo gradiente de mármore verde -->
  <defs>
    <linearGradient id="marbleGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6b5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a5a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f4a42;stop-opacity:1" />
    </linearGradient>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Borda externa (cinza/chumbo) -->
  <polygon points="100,10 190,100 100,190 10,100" fill="#4a5f5a" />

  <!-- Losango principal (gradiente verde mármore) -->
  <polygon points="100,18 182,100 100,182 18,100" fill="url(#marbleGreen)" />

  <!-- Borda interna clara -->
  <polygon points="100,18 182,100 100,182 18,100" fill="none" stroke="#e8f4f0" stroke-width="2" opacity="0.3" />

  <!-- Letras MLN em branco elegante -->
  <text x="100" y="115" font-family="Georgia, serif" font-size="64" font-weight="300" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)" letter-spacing="8">MLN</text>
</svg>
